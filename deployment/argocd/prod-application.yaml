apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: projektfeladat-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akos1940/appfejlesztes-technologiak.git
    targetRevision: HEAD
    path: deployment/prod
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: projektfeladat-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true