<section class="page">
  <header class="page-header">
    <h1>{{ id ? 'Szerkesztés' : 'Új feladat' }}</h1>
    <a class="button" routerLink="/todos">Vissza</a>
  </header>

  <p class="error" *ngIf="error">{{ error }}</p>
  <p *ngIf="loading">Betöltés...</p>

  <form *ngIf="!loading" (ngSubmit)="save()" class="form">
    <label>
      Cím
      <input type="text" [(ngModel)]="title" name="title" required maxlength="200" />
    </label>

    <label>
      Leírás
      <textarea [(ngModel)]="description" name="description" maxlength="4000" rows="4"></textarea>
    </label>

    <label class="inline">
      <input type="checkbox" [(ngModel)]="isCompleted" name="isCompleted" />
      Kész
    </label>

    <label>
      Határidő
      <input type="datetime-local" [(ngModel)]="dueAtLocal" name="dueAtLocal" />
    </label>

    <div class="actions">
      <button class="button primary" type="submit" [disabled]="saving">{{ saving ? 'Mentés...' : 'Mentés' }}</button>
    </div>
  </form>
</section>
